    </div>
    
  </div>

  <!-- search bar right -->
  <div class="flex flex-row gap-4">
   <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues..." />
</label>

<div>
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
</div>
    
  </div>

    <!--  -->
    <main class="bg-base-200 pt-12">
      <!-- button section -->
      <section class="w-[90%] mx-auto border border-white rounded-xl bg-base-100">
      <div class="p-4 flex flex-col items-center md:flex-row gap-4">
        <button onclick="BtnDisplay('all-btn')" class="btn btn-primary w-28" id="all-btn">All</button>
        <button onclick="BtnDisplay('open-btn')" class="btn btn-outline w-28" id="open-btn">Open</button>
        <button onclick="BtnDisplay('close-btn')" class="btn btn-outline w-28" id="close-btn">Closed</button>
      </div>

      </section>

      <!-- count section -->
      <section class="w-[90%] mx-auto p-4 border border-white rounded-xl bg-base-100 mt-8">
        <div class="flex flex-col items-center md:flex-row justify-between">
          <!-- left -->
          <div class="flex flex-row gap-2 items-center">
            <div class="bg-base-300 rounded-full p-2 w-fit">
              <img src="./assets/Aperture.png" alt="" class="object-cover w-10 h-10">
            </div>
            
            <div>
              <h3 class="font-bold text-2xl"><span id="issue-count">0</span> Issues</h3>
              <p class="text-[#64748B] text-xl">Track and manage your project issues</p>
            </div>

          </div>

          <!-- right -->
          <div class="flex flex-row items-center gap-3">
            <p><i class="fa-solid fa-circle" style="color: rgb(24, 157, 24);"></i> Open</p>
            <p> <i class="fa-solid fa-circle" style="color: rgb(148, 74, 199);"></i> Close</p>

          </div>
        </div>
        


      </section>


      <!-- card section -->
      <section class="w-[90%] mx-auto p-4 border border-base-300 rounded-xl bg-base-300 mt-8">
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-4 gap-3">
