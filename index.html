<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>

    <!-- tailwind and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
  font-optical-sizing: auto;
    }
</style>
</head>
<body class="bg-base-200 mx-auto">
    
    <section class="min-h-screen max-w-120 mx-auto bg-white flex flex-col justify-center">
        <div class="pt-16 mx-auto text-center">
        <img src="./assets/github-logo.png" alt="github logo" class="mx-auto">
        <h2 class="font-bold text-3xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B] ">Sign in to manage your issues</p>
    </div>

    <div class="form pt-10 mx-auto w-[90%]">
        
        <fieldset class="fieldset">
          <label class="label text-xl text-black">Username</label>
          <input id="input-name" type="text" class="input w-full rounded-2xl" placeholder="Enter Username" maxlength="5" minlength="5"/>
          <p class="text-blue-700 text-left">Default: admin</p>
          <label class="label text-xl text-black">Password</label>
          <input id="input-pass" type="password" class="input w-full rounded-2xl" placeholder="Enter Password" />
          <p class="text-blue-700 text-left">Default: admin123</p>
          
          <button class="btn btn-primary mt-4 " id="signin-btn">Sign in</button>
        </fieldset>

        <p class="pt-5 text-center">Or</p>

        <div class="text-center pt-3">
            <p class="text-[#64748B]">Demo Credentials:</p>
            <div class="bg-base-200 mt-3 rounded-xl space-y-1.5">
                <p class="text-xl"><span class="font-bold">Username:</span> admin</p>

                <p class="text-xl"><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
      

    </div>
     

    </section>
    

    <!-- js link -->
     <script src="./scripts/login.js"></script>
</body>
</html>
